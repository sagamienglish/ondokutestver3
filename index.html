    const LESSON_TEXT_DATA = {
      "L1-1": "　What is the top sightseeing spot in Japan among foreign tourists? Kinkakuji Temple? Hiroshima Peace Memorial Park? The answer is... Fushimi-Inari Taisha Shrine in Kyoto! Actually, I went there last month. The shrine is famous for its countless red torii gates.\n　Look at this photo. What are these black letters? They are the construction dates of the gates and the names of donors! The sharp contrast between the red gates and the black letters is very exotic. It appeals to visitors from abroad.",
      "L1-2": "　Nowadays, not only sightseeing but also \"new tourism\" is popular. Sports tourism and cultural tourism are two examples of this \"new tourism.\" That is, tourists are seeking fresh experiences, not just sightseeing.\n　Do you know the word \"Japow\"? It stands for \"Japanese powder snow.\" The snow is very soft and light, like powder. Skiers and snowboarders from all around the world come and experience Japow. Niseko in Hokkaido is especially popular with them. The town is now a mecca for sports tourism!",
      "L1-3": "　Many tourists enjoy cultural experiences. Some of them go on anime tours. They first stop at the photo exhibition of 88 anime spots all over Japan in Narita Airport. Then they will visit their favorite anime spots.\n　Some go to ninja villages such as Iga and Koka. They can wear ninja costumes and get ninja training.\n　Others visit ordinary Japanese homes and take cooking lessons. They make sushi, udon, or bento with their Japanese hosts. Then they enjoy the taste of Japanese food.\n　What kinds of new tourism does your area provide for foreign tourists?",
      "L2-1": "　Can you see these small blue lights in this picture of Toyama Bay? These lights are much loved by the local people. They are a symbol of spring.\n　Where do the lights come from? They are from firefly squid, hotaruika in Japanese. How do the squid give off light? They have special organs in their bodies. The organs flash light in various patterns.\n　Do other creatures glow like these squid? Yes. Fireflies, anglerfish, and crystal jellyfish also produce light. How do they give off light? We do not understand it clearly.",
      "L2-2": "　Firefly squid flash light when they distract predators.\n　Fireflies fly near rivers in the Japanese countryside on early summer nights. They have appeared in Japanese poems and songs for centuries. They turn their lights on and off when they look for mates.\n　Anglerfish live in the deep dark sea. They flash lights when they look for food. The lights attract small fish.\n　In these ways, light is used for different purposes.",
      "L2-3": "　Light from creatures is useful in the study of medicine. It is used for cancer treatment. For successful treatment, early cancer detection is important.\n　Scientists discovered a luminous protein in crystal jellyfish. They have been using it in the development of methods for cancer detection. When it is put into a human body, cancer cells glow. They are found with a special camera.\n　The study of light from creatures will certainly improve and brighten our lives.",
      "L3-1": "　With his powerful and beautiful swing, Yoshida Masataka has a lot of hits and home runs. His ability to hit balls amazes everyone.\n　Yoshida now plays for one of the Major League teams. Although he is not very tall, his strong muscles make up for his height. When he hits a home run, his teammates give him plastic dumbbells to congratulate him. He smiles and pretends to do muscle training with the dumbbells.\n　Many fans come to the stadium to see his performance every game. How did Yoshida get here?",
      "L3-2": "　Yoshida was an outstanding player in high school, but he did not always have good luck. In his last year, his team did not make it to Koshien. He was discouraged and stayed away from baseball for the first time in his life. After one month, he realized that he truly loved baseball. However, he knew that he was not good enough to become a professional player yet. So, he decided to go to university to play baseball.\n　After he practiced hard for four years, Yoshida was welcomed by a professional baseball team. Unfortunately, he had aches in his lower back during the first two years. After surgery, he started muscle training to build a strong body.",
      "L3-3": "　Yoshida's childhood dream was to be a major leaguer. It came true. Also, he has been working on another dream. He supports children in developing countries. He donates 100,000 yen for each of his home runs. This money goes to Cambodia, Bangladesh, and the Philippines to help children in need.\n　Yoshida has realized his dreams, but he is still modest. \"I put all my energy into every one of my hits. That's all.\" He smiled and continued. \"Is it difficult to realize your dream? Don't worry. Achieving one small goal at a time will lead you to your big dream.\"",
      "L4-1": "　Look at the picture. The yellow part looks like a rocket. Below the rocket is white popcorn representing smoke from the rocket! The title of the work is \"Corn Fuel Rocket.\" The work shows the future need for biofuels.\n　Miniature artist Tanaka Tatsuya displayed 128 works. Many of them showed possible solutions for global problems. One of them was \"Corn Fuel Rocket.\" Tanaka's works were a perfect match for the theme of the Japan Pavilion. It was \"Where ideas meet.\"\n　Tanaka combines everyday objects with miniature figures and creates completely different images by mitate. Mitate is a way of interpreting one thing as another.",
      "L4-2": "　Power On: How did you become a mitate artist?\n　Tanaka: Originally, I collected plastic models and miniature figures as a pastime and took pictures of them. One day, I thought broccoli next to a hamburger steak looked like a tree. That night, I took a picture of \"broccoli trees\" with miniature animals. Looking at ordinary objects as something else was so much fun.\n　I believe that mitate is a traditional Japanese culture. Japanese people like seeing one thing as another. A good example is a Japanese rock garden made of rocks, stones, and pebbles. They express mountains and water. I want to share the concept of mitate with people all over the world.",
      "L4-3": "　Power On: You have been posting your work on social media every day since 2011. Which work would you like to introduce most?\n　Tanaka: Well, I'd like to choose \"Have a Rice Trip!\" The rice around the plane represents white clouds up in the sky. This work got a lot of likes. Its English title might also be witty.\n　Power On: It really is! We often use the phrase \"Have a nice trip.\" \"Nice\" in this phrase and \"rice\" in the title rhyme perfectly! Well, do you have any messages for high school students?\n　Tanaka: Find your own favorite thing. If you have one, just pursue it!",
      "L5-1": "　Bananas are one of the most popular fruits not only in Japan but also all over the world. Their yellow color, their sweet taste, and their unique shape are familiar to everyone. What else do you know about them?\n　Here are some facts about bananas. Almost all the bananas that are eaten in Japan come from foreign countries. The name comes from the Arabic word banan for finger. Bananas do not grow on trees, but on enormous herbs.",
      "L5-2": "　There is another interesting and important fact about bananas. You can make paper from them. However, it is not made from the part of bananas that you eat, but from banana stems.\n　Bananas grow on stems just once. Usually, banana stems are thrown away after the bananas are harvested. However, Japanese techniques have changed banana stems from waste into a sustainable resource.\n　After bananas are harvested, the stems are cut down, turned into fibers, and sent to Japan. They are processed with techniques for making washi and made into beautiful paper. Now, several Japanese companies sell banana paper products such as business cards, origami paper, and notebooks.",
      "L5-3": "　The fibers for Japanese banana paper come from Mfuwe Village in a national park in Zambia. Elephants, giraffes, and other wild animals live in the park. Until a few years earlier, the villagers had few jobs, and they faced various problems: poverty, a lack of education, and the illegal hunting of wild animals.\n　In 2011, a Japanese company started a banana paper project in Mfuwe Village. The project has helped the villagers with their problems. They have gotten jobs from the project, and now their children can go to school. Also, they do not have to hunt wild animals for money. In this way, the project has improved the villagers' lives. It is also playing an important part in protecting wild animals. Thanks to the banana paper created through Japanese techniques, life in the village seems to be better.",
      "L6-1": "　Many people are interested in the human mind and behavior. It is quite natural that we want to understand more about them. The following three experiments show some interesting things about human behavior.\n　Question What item should be in your lost wallet in order to get it back? A photo of A a baby B a puppy C a family D an elderly couple\n　Answer The answer is A. A group of researchers dropped 240 wallets around a city in Scotland. Each wallet had one of the four items in it. The researchers wanted to find out its return percentage. The rates for A, B, C, and D were 88%, 53%, 48%, and 28%. This result suggests that people are naturally attracted by babies and want to protect them like their parents.",
      "L6-2": "　Question There are two boxes in front of you and each box has 24 cookies. The cookies look so delicious. But you should not eat too many because you are on a diet. In this situation, which box is better for you?\n　Box A: Each cookie is wrapped.\n　Box B: No cookies are wrapped.\n　Answer Box A is better. According to one study, the participants needed an average of 24 days to finish eating all the cookies in Box A. However, it took only six days on average to finish the cookies in Box B. This was because the participants had to open the wrapping in Box A. At that time, they hesitated to eat more cookies.",
      "L6-3": "　Question You tend to buy unnecessary food when you go to a supermarket. How can you stop this behavior?\n　Answer One study found eating before shopping useful. In the study, the first group of people ate nothing before shopping, while the second group ate a muffin. The results showed that the first group bought more unnecessary food than the second group. That is to say, if you are hungry, you are likely to purchase more unnecessary food. So next time you go shopping, eat something before you enter a supermarket and save money!",
      "L7-1": "　In May 2018, a whale was found on a beach in southern Thailand. It was very sick because it had nearly nine kilograms of black plastic bags in its stomach. Animal doctors worked hard, but the whale died. One of them said, \"Think about how much plastic is in the ocean. This tragedy will occur more often in the future.\"\n　Sea turtles are also victims of plastic waste like plastic bags and bottle caps. In fact, about 75% of all green sea turtles caught for studies had plastic waste in their stomachs. They often mistake plastic bags for jellyfish, a food they like. They eat them, then they slowly die.\n　Sea animals are fighting to survive in the places where we find so much plastic waste.",
      "L7-2": "　According to a survey, over 300 million tons of plastic was produced in 2020. About eight million tons of plastic debris end up in the ocean every year. It takes hundreds to thousands of years for plastic in the ocean to decompose. For example, plastic bottles take about 400 years to decompose. By 2050, there may be more plastic than fish in the ocean in terms of weight.\n　To make matters worse, some of the plastic breaks down into microplastics, or plastic pieces smaller than five millimeters. Sea creatures eat these microplastics. Humans, in turn, consume the sea creatures. The day when humans also become victims of plastic waste will soon come.",
      "L7-3": "　A non-profit organization created a special system to collect plastic waste from the ocean. The organization was founded by Boyan Slat, a Dutch inventor, when he was 19. He aims to remove 90% of all floating plastic waste from the ocean by 2040. From the waste, they made and sold sunglasses. The sale of one pair of sunglasses, $200, can clean an area of the ocean covering 24 soccer fields. Over 200 thousand kilograms of waste has been collected so far, but it is just 0.2% of all plastic waste in the ocean.\n　We can't live without using any plastic now. However, we should reduce its use and create a cycle of reusing it. We need to think about what we can do to protect the oceans, marine life, and ourselves before it is too late.",
      "L8-1": "　Tempura is a traditional Japanese dish. In the U.K., we have a similar dish. What is it? It is fish and chips. Many people say it is the most famous dish in the U.K. It is often eaten in the evening.\n　White-meat fish is used for fish and chips. It is coated in batter and then deep fried like tempura. The batter gives the fish a wonderful, golden, crunchy \"coat.\" The chips are usually thicker than fried potatoes in other places such as the U.S. and Canada. Just salt and vinegar are added to fish and chips to make the taste better.\n　You can eat fish and chips in a shop or take it home. Long ago, when fish and chips was taken home, it was always wrapped in old newspaper. People believed that the newspaper absorbed oil, making the taste better. It also kept the food warm. However, this practice stopped because it was not clean.",
      "L8-2": "　People started eating fried fish and fried potatoes at the beginning of the 19th century. Around that time, during the Industrial Revolution, workers had to work long hours with low pay. They wanted cheap and nutritious food that could be cooked quickly. Fried fish and fried potatoes were just what they needed. However, they were sold separately.\n　In the middle of the 19th century, someone served the fish and the potatoes together. The idea was an instant hit. Today fish and chips seems a natural pair of foods, like curry and rice.\n　At the beginning of the 20th century, every town in Britain had its fish-and-chip shop, which is often called a \"chippie.\" London alone had about 1,200 chippies.",
      "L8-3": "　The white meat fish used for fish and chips was cod. In the 15th century, some people from Europe explored North America. They saw a great number of cod off the Grand Banks of Newfoundland. They said, \"You can walk from your ship to the shore on the backs of the fish without getting your feet wet.\"\n　Now, however, it is a different story. You can no longer find as many cod as before. At the beginning of the 20th century, one fisherman caught over 500 cod a day. However, by the end of the century, the cod had almost gone. Everything has its own limit. We should use food resources sustainably. If not, how much longer can we enjoy fish and chips, or even sushi?",
      "L9-1": "　Newscaster: Have you ever watched esports? Here's Meg Brown, reporting from Tokyo.\n　Reporter: Hi, everyone. Can you see lots of people staring at a big screen? They are shouting and cheering for the players. I am reporting from the venue for the National High School Esports Tournament. The big day has arrived. This is the final match of the tournament. On the front screen, rocket-powered cars are playing soccer and flying across the field. There were 346 teams participating in the tournament. Some of them were made only a few months before the tournament. Now, the last two teams are competing hard to win the championship. Back to you, John.",
      "L9-2": "　Newscaster: I'll explain more about esports. Esports is short for electronic sports. People play video games as a sport. Esports has become popular among young people worldwide since the term \"esports\" became widely known around 2000.\n　Today, there are more than 130 million esports players in the world. Moreover, about 530 million people watch esports games online, on TV, or at a venue. Because of its popularity, the IOC held the first esports event in 2021 just before the Tokyo Olympics.\n　The number of esports clubs in high schools has been sharply increasing in countries such as the United States and Australia. In the U.S., some universities let esports players obtain scholarships.",
      "L9-3": "　Newscaster: There are not many esports clubs in Japanese high schools in spite of its popularity. Can you think of any reasons, Mr. Yoneda?\n　Commentator: Well, some teachers and parents ask me if esports is a real sport. I'm afraid they still see esports as a waste of time. In fact, esports players need skills such as quick responses and concentration, just like other athletes. Even the U.S. government acknowledges esports players as professional athletes. It gives them a special visa to enter the U.S.\n　Newscaster: Then, what are some good points of introducing esports in high schools?\n　Commentator: There are three reasons. First, students can enjoy esports regardless of their body strength. Second, they can learn the value of teamwork. Third, they can communicate and make friends with various people worldwide.\n　Newscaster: Thank you, Mr. Yoneda. You have shown us that esports opens doors to the world.",
      "L10-1": "　The artwork shown above mixes three elements from Japan and its culture: the kimono, Ezo deer, and mountains in ink wash painting.\n　The creator of the work is Shinohara Tomoe, a Japanese designer and artist. She says, \"I've been hoping more people pay attention to sustainability. And I hope this work, a kimono, helps to raise awareness about it. Sustainability and kimonos are connected in my opinion.\"\n　She goes on to explain, \"We can say kimonos are a symbol of sustainability. They are made from one piece of cloth and almost none of it is wasted. Western clothes, however, often use a lot of curved designs, and a number of scraps are left behind.\"\n　She laughs and adds, \"I wish I could make clothes with no waste at all!\"",
      "L10-2": "　\"I've found a related problem with Ezo deer-their overpopulation,\" she continues. \"They are regularly hunted and killed to prevent them from hurting local forests. If they weren't, damage to the forests would be severe. Their meat is eaten and their skins are used in making leather products. But lots of leather scraps are thrown away. This is against sustainability. I decided to use the scraps for my work, the leather scrap kimono.\"\n　She also says, \"I want to do something about the unused skin from a precious life.\"\n　As for the design of the kimono, she explains, \"I noticed the shapes of the scraps are like those of Japanese mountains. I thought I could make a mountain landscape by layering those scraps.\" The result is just what we saw-a beautiful landscape of Japanese mountains in ink wash painting.",
      "L10-3": "　Shinohara is now actively pursuing a career in designing. However, she debuted as a singer when she was a high school student. That was in 1995. She appeared on a lot of TV variety shows and attracted wide public attention. She explains this change in her career focus as follows.\n　\"As a kid I always liked creating things like dolls, drawings, and music. That was my starting point as a designer. Besides the show business, I did some design jobs. But I decided to shift my focus to making things. I decided to devote myself to designing.\"\n　She went back to university to brush up her design skills and knowledge in 2019 at the age of 40.\n　She concludes, \"It's all right to take detours now and then. Without them, I wouldn't be designing now. It's never too late to learn and relearn. Designing is a way for me to contribute to the world.\""
    };

    const loadHtml2Canvas = () => {
      return new Promise((resolve, reject) => {
        if (window.html2canvas) return resolve(window.html2canvas);
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.onload = () => resolve(window.html2canvas);
        script.onerror = () => reject(new Error('html2canvas load failed'));
        document.head.appendChild(script);
      });
    };

    function App() {
      const [mode, setMode] = useState(() => localStorage.getItem('ondokuMode') || 'select'); 
      const [step, setStep] = useState(() => localStorage.getItem('ondokuStep') || 'userInfo'); 
      const waitIntervalRef = useRef(null);
      const vocabIntervalRef = useRef(null);
      const [currentVocab, setCurrentVocab] = useState(null);
      
      const [userInfo, setUserInfo] = useState(() => {
        const savedInfo = localStorage.getItem('ondokuUserInfo');
        return savedInfo ? JSON.parse(savedInfo) : { classNum: '', studentNum: '', name: '', lesson: '1' };
      });
      const [historyList, setHistoryList] = useState(() => {
        const savedHistory = localStorage.getItem('ondokuHistory');
        return savedHistory ? JSON.parse(savedHistory) : [];
      });
      
      const [selectedPart, setSelectedPart] = useState(1);
      const [isRouletteFinal, setIsRouletteFinal] = useState(false);
      const [micReady, setMicReady] = useState(false);
      const [micLevel, setMicLevel] = useState(0);
      const [timeLimit, setTimeLimit] = useState(30);
      const [timeRemaining, setTimeRemaining] = useState(30);
      const [isRecording, setIsRecording] = useState(false);
      const [audioBlob, setAudioBlob] = useState(null);
      const [audioUrl, setAudioUrl] = useState(null);
      const [scoreResult, setScoreResult] = useState(null);
      const [isExporting, setIsExporting] = useState(false);

      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const audioContextRef = useRef(null);
      const analyserRef = useRef(null);
      const animationFrameRef = useRef(null);
      const streamRef = useRef(null);
      const exportContainerRef = useRef(null);

      const clearWaitIntervals = () => {
        if (waitIntervalRef.current) clearInterval(waitIntervalRef.current);
        if (vocabIntervalRef.current) clearInterval(vocabIntervalRef.current);
      };

      const resetToTop = () => {
        clearWaitIntervals();
        setMode('select');
        setStep('userInfo');
        setAudioBlob(null);
        setAudioUrl(null);
        setScoreResult(null);
        localStorage.setItem('ondokuMode', 'select');
        localStorage.setItem('ondokuStep', 'userInfo');
      };

      useEffect(() => {
        let timerId;
        if (isRecording && timeRemaining > 0) {
          timerId = setInterval(() => {
            setTimeRemaining((prev) => {
              if (prev <= 1) {
                clearInterval(timerId);
                stopRecording(); 
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
        }
        return () => clearInterval(timerId);
      }, [isRecording, timeRemaining]);

      const startVisualizer = (stream) => {
        if (!audioContextRef.current) audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
        analyserRef.current = audioContextRef.current.createAnalyser();
        const source = audioContextRef.current.createMediaStreamSource(stream);
        source.connect(analyserRef.current);
        const dataArray = new Uint8Array(analyserRef.current.frequencyBinCount);
        const updateMicLevel = () => {
          analyserRef.current.getByteFrequencyData(dataArray);
          let sum = 0;
          for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
          setMicLevel((sum / dataArray.length));
          animationFrameRef.current = requestAnimationFrame(updateMicLevel);
        };
        updateMicLevel();
      };

      const startNewTry = async (e) => {
        if (e) e.preventDefault();
        setAudioBlob(null); setAudioUrl(null); setScoreResult(null);

        if (!micReady) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            streamRef.current = stream;
            setMicReady(true);
            startVisualizer(stream);
            setMode('flow'); setStep('userInfo');
          } catch (err) {
            console.error(err);
            alert("マイクへのアクセスが拒否されました。ブラウザのアドレスバー左側にある南京錠アイコンをクリックして『権限をリセット』してから、ページを再読み込みしてください。");
            setMode('select');
          }
        } else {
          setMode('flow'); setStep('userInfo');
        }
      };

      const startShuffle = () => {
        localStorage.setItem('ondokuUserInfo', JSON.stringify(userInfo));
        setStep('shuffling');
        setIsRouletteFinal(false);
        const parts = [1, 2, 3]; 
        let currentTick = 0;
        const totalTicks = 25;
        const finalP = parts[Math.floor(Math.random() * parts.length)];
        const tick = () => {
          currentTick++;
          if (currentTick < totalTicks) {
            setSelectedPart(parts[currentTick % 3]);
            setTimeout(tick, Math.pow(currentTick, 1.4) * 4 + 30);
          } else {
            setSelectedPart(finalP); setIsRouletteFinal(true);
            setTimeout(() => {
              const limit = TIME_LIMITS[`${userInfo.lesson}-${finalP}`] || 45;
              setTimeLimit(limit); setTimeRemaining(limit); setStep('recording');
            }, 1500);
          }
        };
        tick();
      };

      const startRecording = async () => {
        setTimeRemaining(timeLimit); setAudioBlob(null); setAudioUrl(null);
        try {
          const stream = streamRef.current || await navigator.mediaDevices.getUserMedia({ audio: true });
          if (!streamRef.current) { streamRef.current = stream; startVisualizer(stream); }
          mediaRecorderRef.current = new MediaRecorder(stream);
          audioChunksRef.current = [];
          mediaRecorderRef.current.ondataavailable = (event) => { if (event.data.size > 0) audioChunksRef.current.push(event.data); };
          mediaRecorderRef.current.onstop = () => {
            if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
            const blob = new Blob(audioChunksRef.current, { type: mediaRecorderRef.current.mimeType || 'audio/webm' });
            setAudioBlob(blob); setAudioUrl(URL.createObjectURL(blob));
            stream.getTracks().forEach(track => track.stop()); streamRef.current = null;
          };
          mediaRecorderRef.current.start();
          setIsRecording(true);
        } catch (e) {
          alert("マイクエラーが発生しました。");
        }
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
        }
      };

      const startScoringQueue = () => {
        const delaySeconds = Math.floor(Math.random() * 30);
        if (delaySeconds === 0) { processScoring(); return; }
        
        setStep('waiting'); 
        setTimeRemaining(delaySeconds);
        const vocabList = LESSON_VOCAB_DATA[userInfo.lesson] || [{en:"vocabulary",ja:"語彙"}];
        setCurrentVocab(vocabList[Math.floor(Math.random() * vocabList.length)]);
        
        vocabIntervalRef.current = setInterval(() => {
          setCurrentVocab(vocabList[Math.floor(Math.random() * vocabList.length)]);
        }, 4000);
        
        let currentWait = delaySeconds;
        waitIntervalRef.current = setInterval(() => {
          currentWait--; setTimeRemaining(currentWait);
          if (currentWait <= 0) { clearWaitIntervals(); processScoring(); }
        }, 1000);
      };

      const processScoring = async () => {
        setStep('scoring');
        try {
          if (GAS_WEB_APP_URL.includes("ここにGASのWebアプリURL")) {
            throw new Error("GASのURLが設定されていません。HTMLの44行目を確認してください。");
          }
          const base64Audio = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
          });
          
          const referenceText = LESSON_TEXT_DATA[`L${userInfo.lesson}-${selectedPart}`];

const commonEvalPrompt = `【1. 評価ポリシー：高校生向け実戦採点方式】
あなたは厳格さと温かさを兼ね備えた英語教師です。採点単位は必ず【0.5点刻み】で行ってください。

■ 採点の基準
・標準的な「詰まらずに読めた高校生」の合計点を【8.5点】とします。
・10.0点（満点）は「教科書の見本音声」や「ネイティブレベル」のみに限定してください。
・「カタカナ発音」が目立つ場合は、発音項目から0.5〜1.0点の減点を行ってください。
・非常に細かなミス（冠詞のわずかな抜け等）は減点しなくて構いません。
★重要：テキストの一部を読み飛ばした（未読・スキップ）り、時間切れで最後まで読めなかった場合は、未読の単語数に応じて「発音」および「つながり」から必ず0.5点以上減点してください。

■ 各項目の配分 (合計10点)
・発音 (4.0点満点): 標準的な高校生は 3.5点。カタカナ英語は 2.5〜3.0点。未読・スキップがある場合は減点。
・抑揚 (3.0点満点): 標準的な高校生は 2.5点。棒読みは 1.5〜2.0点。
・つながり (3.0点満点): 標準的な高校生は 2.5点。詰まりが多ければ減点。途中終了やスキップがあれば減点。`;

          const prompt = `以下の【正しい英文】を生徒が音読した音声を評価しJSONで出力せよ。採点単位は0.5点刻みとすること。
★重要：生徒へのフィードバックコメント（pronunciation_feedback, intonation_feedback, fluency_feedback, general_comment）は、必ず【日本語】で記述すること。
★最重要：フィードバックの文章の中には、<bad> や <excellent> などのHTMLタグや記号を【絶対に】含めないでください。純粋なテキストのみにすること。

【正しい英文】
${referenceText}

${commonEvalPrompt}

【2. ハイライト用テキスト作成 (highlighted_text) ルール】
・「難しい単語（3音節以上、または綴りと発音が乖離している単語）」を上手に読めた場合のみ、その1単語を <excellent>単語</excellent> で囲む。
・読み間違えた単語は <bad>単語</bad> で囲む。
★重要：読み飛ばした単語（未読・スキップ）、および時間切れで読めなかった後半の単語は、すべて漏れなく <skipped>単語</skipped> で囲むこと。
・普通の単語はタグをつけないこと。
★元の英文の改行や段落インデント（全角スペース）は維持して出力すること。`;

          let resultData = null;
          const delays = [1000, 2000, 4000];
          
          for (let i = 0; i < 3; i++) {
            try {
              const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ base64Audio, prompt })
              });
              
              if (!response.ok) throw new Error("通信エラー: HTTPステータス " + response.status);
              
              const text = await response.text();
              const json = JSON.parse(text);
              
              if (json.error) throw new Error("GAS/Geminiエラー: " + json.error);
              
              resultData = json;
              break; 
            } catch (e) {
              console.error("Attempt", i + 1, "failed", e);
              if (i === 2) throw e;
              await new Promise(r => setTimeout(r, delays[i]));
            }
          }

          const totalScoreNum = parseFloat((resultData.pronunciation_score + resultData.intonation_score + resultData.fluency_score).toFixed(1));

          const newResult = {
            ...resultData,

            lesson: userInfo.lesson,
            part: selectedPart,
            date: new Date().toISOString()
          };

          setScoreResult(newResult);

          const updatedHistory = [newResult, ...historyList].slice(0, 50);
          setHistoryList(updatedHistory);
          localStorage.setItem('ondokuHistory', JSON.stringify(updatedHistory));

        } catch (error) {
          console.error(error);
          alert("採点エラーが発生しました。\n原因: " + error.message + "\n\n1分ほど待ってから『録り直す』→『分析する』を試してみてください。");
          setStep('recording');
        }
      };

      const getEvaluation = (totalScoreNum) => {
        if (totalScoreNum >= 10) return { text: "Perfect!", color: "text-yellow-500" };
        if (totalScoreNum >= 9) return { text: "Excellent!", color: "text-blue-500" };
        if (totalScoreNum >= 8) return { text: "Very Good!", color: "text-green-500" };
        if (totalScoreNum >= 7) return { text: "Good!", color: "text-orange-500" };
        if (totalScoreNum >= 6) return { text: "Not Bad!", color: "text-purple-500" };
        if (totalScoreNum >= 5) return { text: "Nice Try!", color: "text-teal-500" };
        if (totalScoreNum >= 4) return { text: "You can do it!", color: "text-pink-500" };
        if (totalScoreNum >= 3) return { text: "Keep going!", color: "text-indigo-500" };
        if (totalScoreNum >= 2) return { text: "Don't give up!", color: "text-red-500" };
        return { text: "Practice more!", color: "text-gray-600" };
      };

      const exportVideo = async () => {
        if (!exportContainerRef.current || !audioBlob) return;
        
        const mimeTypes = [
          'video/mp4', 
          'video/webm;codecs=h264', 
          'video/webm;codecs=vp9', 
          'video/webm;codecs=vp8', 
          'video/webm'
        ];
        let selectedMimeType = '';
        for (const type of mimeTypes) {
          if (MediaRecorder.isTypeSupported(type)) { selectedMimeType = type; break; }
        }
        if (!selectedMimeType) return alert("お使いのブラウザは動画の書き出しをサポートしていません。");

        setIsExporting(true);

        try {
          // 1. ユーザーアクション直後にAudioContextを初期化・再開
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          if (audioContext.state === 'suspended') {
            await audioContext.resume();
          }

          // 2. 音声データをAudioBufferに変換 (これで自動再生ブロックを完全に回避)
          const arrayBuffer = await audioBlob.arrayBuffer();
          const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

          // 3. html2canvasで画像を生成
          const html2canvas = await loadHtml2Canvas();
          const target = exportContainerRef.current;
          await new Promise(r => setTimeout(r, 100));

          const canvas = await html2canvas(target, { 
            scale: 1, 
            useCORS: true,
            backgroundColor: '#ffffff',
            logging: false
          });

          // 4. ストリームの準備
          const videoStream = canvas.captureStream(30);
          
          const sourceNode = audioContext.createBufferSource();
          sourceNode.buffer = audioBuffer;
          
          // 録音用のアウトプット
          const streamDestination = audioContext.createMediaStreamDestination();
          sourceNode.connect(streamDestination);
        
          const audioStream = streamDestination.stream;
          const combinedStream = new MediaStream([...videoStream.getVideoTracks(), ...audioStream.getAudioTracks()]);
          
          const recorder = new MediaRecorder(combinedStream, { mimeType: selectedMimeType });
          const chunks = [];
          recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
          
          recorder.onstop = () => {
            const ext = selectedMimeType.includes('mp4') ? 'mp4' : 'webm';
            const blob = new Blob(chunks, { type: selectedMimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `音読結果_${userInfo.name}_L${userInfo.lesson}-${selectedPart}.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
            setIsExporting(false);
          };
          
          // 5. 録画と再生を開始 (Web Audio APIならここでブロックされない！)
          recorder.start();
          sourceNode.start();

          // 6. 描画ループ
          let isPlaying = true;
          const drawLoop = () => {
            if (isPlaying && recorder.state === 'recording') {
              const ctx = canvas.getContext('2d');
              ctx.drawImage(canvas, 0, 0);
              requestAnimationFrame(drawLoop);
            }
          };
          drawLoop();

          // 7. 終了処理
          sourceNode.onended = () => {
             isPlaying = false;
             if (recorder.state === 'recording') recorder.stop();
          };

          // 8. フリーズ防止の強制終了タイマー（音声の長さ + 5秒）
          setTimeout(() => {
             if (recorder.state === 'recording') {
                 isPlaying = false;
                 recorder.stop();
             }
          }, (audioBuffer.duration + 5) * 1000);

        } catch (error) {
          console.error("Export error:", error);
          alert("動画の書き出し中にエラーが発生しました。\n" + error.message);
          setIsExporting(false);
        }
      };

      const speakWord = (word) => {
        if (!window.speechSynthesis) return;
        const cleanWord = word.replace(/[^a-zA-Z0-9'-]/g, '');
        if (!cleanWord) return;
        window.speechSynthesis.cancel();

        window.speechSynthesis.speak(utterance);
      };

                  >{text}</span>

                return <del key={index} className="text-gray-400 mx-[2px]">{text}</del>;
              } else {
                return <span key={index}>{part}</span>;

      const renderExportHighlightedText = (htmlStr) => {

              </button>
            </div>
          </div>
        );
      };

      return (
        <React.Fragment>
          {mode === 'select' && renderSelect()}
          {mode === 'flow' && step === 'userInfo' && renderUserInfo()}
          {mode === 'flow' && step === 'shuffling' && renderShuffling()}
          {mode === 'flow' && step === 'recording' && renderRecording()}
          {mode === 'flow' && step === 'waiting' && renderWaiting()}
          {mode === 'flow' && step === 'scoring' && renderScoring()}
          {(mode === 'flow' && step === 'result') && renderResult()}
          
          {mode === 'historyList' && renderHistoryList()}
          {mode === 'historyDetail' && renderResult()}

          {renderExportTemplate()}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
